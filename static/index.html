<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blinkchat — Talk to Strangers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #7c6af7;
  --accent-dark: #6a5ae0;
  --bg: #0d0d12;
  --bg2: #13131e;
  --bg3: #10101a;
  --border: #1e1e2e;
  --text-muted: #666;
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  padding: 10px 16px;
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 20;
}

.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo .blink { color: var(--accent); }

#status-bar { display: flex; gap: 10px; align-items: center; }
#status { font-size: 12px; color: var(--text-muted); }
#online-count { font-size: 12px; color: var(--accent); background: #1e1a3a; padding: 3px 10px; border-radius: 20px; }

/* ── MAIN AREA ── */
.main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── VIDEOS ── */
.videos { flex: 1; position: relative; background: #000; min-width: 0; }

#remote-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

#local-video {
  position: absolute;
  bottom: 14px; right: 14px;
  width: 150px; height: 112px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid var(--accent);
  background: #1a1a24;
  z-index: 10;
  transition: all 0.2s;
}

/* ── OVERLAY ── */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(13,13,18,0.93);
  flex-direction: column;
  gap: 12px;
  z-index: 5;
}
.overlay.hidden { display: none; }
.overlay h2 { font-size: 26px; font-weight: 700; text-align: center; padding: 0 20px; }
.overlay p { color: var(--text-muted); font-size: 14px; text-align: center; padding: 0 20px; }

.spinner {
  width: 42px; height: 42px;
  border: 3px solid #1e1e2e;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DESKTOP SIDEBAR ── */
.sidebar {
  width: 280px;
  display: flex;
  flex-direction: column;
  background: var(--bg3);
  border-left: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-header {
  padding: 12px 14px;
  font-size: 12px;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
}
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

.msg {
  max-width: 88%;
  padding: 8px 12px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.45;
  word-break: break-word;
}
.msg.them { background: #1e1e2e; align-self: flex-start; border-radius: 4px 14px 14px 14px; }
.msg.me { background: var(--accent); align-self: flex-end; border-radius: 14px 4px 14px 14px; }
.msg.system { background: transparent; color: #444; font-size: 11px; align-self: center; text-align: center; padding: 2px 0; }

.chat-input-row {
  padding: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

#msg-input {
  flex: 1;
  background: #1a1a24;
  border: 1px solid #2a2a3a;
  color: #fff;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: #444; }

#send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 9px 13px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  transition: background 0.2s;
  flex-shrink: 0;
}
#send-btn:hover:not(:disabled) { background: var(--accent-dark); }
#send-btn:disabled { background: #2a2a3a; cursor: not-allowed; }

/* ── CONTROLS BAR ── */
.controls {
  padding: 10px 20px;
  background: var(--bg2);
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.icon-btn {
  background: #1e1e2e;
  border: none;
  color: #fff;
  width: 42px; height: 42px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.icon-btn:hover { background: #2a2a3a; }
.icon-btn.off { background: #c0392b; }

#start-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 11px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
#start-btn:hover { background: var(--accent-dark); }

#next-btn, #stop-btn {
  border: none;
  color: #fff;
  padding: 11px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: none;
}
#next-btn { background: #2a2a3a; }
#next-btn:hover { background: #3a3a4a; }
#stop-btn { background: #c0392b; }
#stop-btn:hover { background: #a93226; }

/* chat toggle — only on mobile */
#chat-toggle-btn { display: none; }

/* ── MOBILE CHAT DRAWER ── */
.chat-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 49;
}
.chat-backdrop.open { display: block; }

.mobile-drawer {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 55vh;
  background: var(--bg3);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--border);
  z-index: 50;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.mobile-drawer.open {
  transform: translateY(0);
}

.drawer-handle {
  width: 36px; height: 4px;
  background: #333;
  border-radius: 2px;
  margin: 10px auto 8px;
  flex-shrink: 0;
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 10px;
  flex-shrink: 0;
}
.drawer-header span { font-size: 13px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
.drawer-close {
  background: none;
  border: none;
  color: #666;
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
}

#chat-mobile {
  flex: 1;
  overflow-y: auto;
  padding: 8px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
}
#chat-mobile::-webkit-scrollbar { width: 2px; }
#chat-mobile::-webkit-scrollbar-thumb { background: #2a2a3a; }

.chat-input-row-mobile {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}

#msg-input-mobile {
  flex: 1;
  background: #1a1a24;
  border: 1px solid #2a2a3a;
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}
#msg-input-mobile:focus { border-color: var(--accent); }
#msg-input-mobile::placeholder { color: #444; }

#send-btn-mobile {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  flex-shrink: 0;
}

/* ── MOBILE OVERRIDES (<= 767px) ── */
@media (max-width: 767px) {
  header { padding: 10px 14px; }
  .logo { font-size: 18px; }

  /* Hide desktop sidebar */
  .sidebar { display: none !important; }

  /* Videos: full width */
  .videos { width: 100%; }

  /* Local video: top-right, smaller */
  #local-video {
    bottom: auto;
    top: 10px; right: 10px;
    width: 90px; height: 68px;
    border-radius: 8px;
  }

  /* Controls: more compact, touch-friendly */
  .controls {
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    gap: 8px;
    flex-wrap: nowrap;
  }

  .icon-btn {
    width: 46px; height: 46px;
    font-size: 20px;
  }

  #start-btn  { padding: 12px 20px; font-size: 15px; }
  #next-btn   { padding: 12px 16px; font-size: 14px; }
  #stop-btn   { padding: 12px 16px; font-size: 14px; }

  /* Chat toggle button: visible on mobile */
  #chat-toggle-btn {
    display: flex;
    position: relative;
  }

  /* Mobile drawer: flex when active */
  .mobile-drawer { display: flex; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="blink">blink</span><span class="chat">chat</span></div>
  <div id="status-bar">
    <span id="status">Ready</span>
    <span id="online-count">0 online</span>
  </div>
</header>

<div class="main">
  <div class="videos">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="overlay" id="overlay">
      <div class="spinner" id="spinner" style="display:none"></div>
      <h2 id="ov-title">Talk to Strangers</h2>
      <p id="ov-sub">Click Start to find someone</p>
    </div>
  </div>

  <!-- Desktop sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">Chat</div>
    <div id="chat"></div>
    <div class="chat-input-row">
      <input type="text" id="msg-input" placeholder="Type a message..." disabled maxlength="500" autocomplete="off">
      <button id="send-btn" disabled>➤</button>
    </div>
  </div>
</div>

<div class="controls">
  <button class="icon-btn" id="mic-btn" title="Mute mic">🎤</button>
  <button class="icon-btn" id="cam-btn" title="Turn off camera">📷</button>
  <button id="start-btn">▶ Start</button>
  <button id="next-btn">⏭ Next</button>
  <button id="stop-btn">■ Stop</button>
  <!-- Mobile only: chat toggle -->
  <button class="icon-btn" id="chat-toggle-btn" title="Chat">💬</button>
</div>

<!-- Mobile chat drawer -->
<div class="chat-backdrop" id="chat-backdrop"></div>
<div class="mobile-drawer" id="mobile-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span>Chat</span>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>
  <div id="chat-mobile"></div>
  <div class="chat-input-row-mobile">
    <input type="text" id="msg-input-mobile" placeholder="Type a message..." disabled maxlength="500" autocomplete="off">
    <button id="send-btn-mobile" disabled>➤</button>
  </div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
const isMobile = () => window.innerWidth <= 767;

// ICE servers
let ICE = [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
  { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
  { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
];

async function loadICE() {
  try {
    const r = await fetch("https://asistan-9te2.onrender.com/ice");
    const d = await r.json();
    const servers = d.ice_servers.map(s => ({
      urls: s.url || s.urls, username: s.username, credential: s.credential
    })).filter(s => s.urls);
    const hasTurn = servers.some(s => String(s.urls).startsWith("turn:"));
    if (hasTurn) {
      ICE = [{ urls: "stun:stun.l.google.com:19302" }, ...servers, ...ICE.filter(s => String(s.urls).startsWith("turn:openrelay"))];
    }
  } catch(e) {}
}

let ws = null, pc = null, localStream = null;
let active = false, role = null, partnered = false;
let pendingCandidates = [], remoteDescSet = false;
let iceReady = false;

(async () => { await loadICE(); iceReady = true; })();

// DOM refs
const remoteVideo = document.getElementById("remote-video");
const localVideo  = document.getElementById("local-video");
const chatEl      = document.getElementById("chat");
const chatMobile  = document.getElementById("chat-mobile");
const msgInput    = document.getElementById("msg-input");
const sendBtn     = document.getElementById("send-btn");
const msgInputM   = document.getElementById("msg-input-mobile");
const sendBtnM    = document.getElementById("send-btn-mobile");
const startBtn    = document.getElementById("start-btn");
const nextBtn     = document.getElementById("next-btn");
const stopBtn     = document.getElementById("stop-btn");
const overlay     = document.getElementById("overlay");
const ovTitle     = document.getElementById("ov-title");
const ovSub       = document.getElementById("ov-sub");
const spinner     = document.getElementById("spinner");
const statusEl    = document.getElementById("status");
const onlineEl    = document.getElementById("online-count");
const micBtn      = document.getElementById("mic-btn");
const camBtn      = document.getElementById("cam-btn");
const chatToggle  = document.getElementById("chat-toggle-btn");
const drawer      = document.getElementById("mobile-drawer");
const backdrop    = document.getElementById("chat-backdrop");
const drawerClose = document.getElementById("drawer-close");

// Mobile drawer
function openDrawer() {
  drawer.classList.add("open");
  backdrop.classList.add("open");
  msgInputM.focus();
}
function closeDrawer() {
  drawer.classList.remove("open");
  backdrop.classList.remove("open");
}
chatToggle.addEventListener("click", openDrawer);
drawerClose.addEventListener("click", closeDrawer);
backdrop.addEventListener("click", closeDrawer);

// Overlay helpers
function setOverlay(title, sub, spin = false) {
  overlay.classList.remove("hidden");
  ovTitle.textContent = title;
  ovSub.textContent = sub;
  spinner.style.display = spin ? "block" : "none";
}
function hideOverlay() { overlay.classList.add("hidden"); }

// Add message to both desktop and mobile chats
function addMsg(text, type = "system") {
  [chatEl, chatMobile].forEach(el => {
    const d = document.createElement("div");
    d.className = "msg " + type;
    d.textContent = text;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  });
  // Badge on chat toggle if drawer is closed and new message
  if (type === "them" && !drawer.classList.contains("open")) {
    chatToggle.textContent = "🔔";
    chatToggle.style.background = "#c0392b";
  }
}

function clearChats() {
  chatEl.innerHTML = "";
  chatMobile.innerHTML = "";
  chatToggle.textContent = "💬";
  chatToggle.style.background = "";
}

function enableChat(on) {
  msgInput.disabled = !on;
  sendBtn.disabled = !on;
  msgInputM.disabled = !on;
  sendBtnM.disabled = !on;
}

function setStatus(t) { statusEl.textContent = t; }
function setOnline(n) { if (n !== undefined) onlineEl.textContent = n + " online"; }

async function getStream() {
  if (localStream) return;
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  localVideo.srcObject = localStream;
}

function closePC() {
  if (pc) { pc.close(); pc = null; }
  remoteVideo.srcObject = null;
  partnered = false;
  remoteDescSet = false;
  pendingCandidates = [];
  enableChat(false);
}

function createPC() {
  closePC();
  pc = new RTCPeerConnection({ iceServers: ICE });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    if (e.streams[0]) remoteVideo.srcObject = e.streams[0];
  };

  pc.onicecandidate = e => {
    if (e.candidate && ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: "ice", candidate: e.candidate }));
  };

  pc.onconnectionstatechange = () => {
    const s = pc?.connectionState;
    if (s === "connected") {
      partnered = true;
      hideOverlay();
      setStatus("Connected");
      addMsg("You are now chatting with a stranger", "system");
      enableChat(true);
    }
    if (s === "failed") {
      addMsg("Connection failed, finding new...", "system");
      closePC();
      setOverlay("Looking for someone...", "Please wait", true);
      setStatus("Finding...");
      connectWS();
    }
  };

  pc.oniceconnectionstatechange = () => {
    if (pc?.iceConnectionState === "failed") pc.restartIce();
  };
}

function connectWS() {
  if (ws) { ws.onclose = null; ws.close(); }
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus("Finding...");
    setOverlay("Looking for someone...", "Please wait", true);
  };

  ws.onmessage = async ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.online !== undefined) setOnline(msg.online);

    if (msg.type === "waiting") {
      setOverlay("Looking for someone...", "Please wait", true);
    }
    else if (msg.type === "matched") {
      role = msg.role;
      clearChats();
      createPC();
      setOverlay("Connecting...", "", true);
      setStatus("Connecting...");
      if (role === "offerer") {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: "offer", sdp: pc.localDescription }));
      }
    }
    else if (msg.type === "offer") {
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      remoteDescSet = true;
      for (const c of pendingCandidates) { try { await pc.addIceCandidate(c); } catch {} }
      pendingCandidates = [];
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: "answer", sdp: pc.localDescription }));
    }
    else if (msg.type === "answer") {
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      remoteDescSet = true;
      for (const c of pendingCandidates) { try { await pc.addIceCandidate(c); } catch {} }
      pendingCandidates = [];
    }
    else if (msg.type === "ice") {
      if (remoteDescSet) {
        try { await pc?.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch {}
      } else {
        pendingCandidates.push(msg.candidate);
      }
    }
    else if (msg.type === "chat") {
      addMsg(msg.text, "them");
    }
    else if (msg.type === "partner_left") {
      handlePartnerLeft();
    }
  };

  ws.onclose = () => {
    if (!active) return;
    closePC();
    setStatus("Reconnecting...");
    setOverlay("Reconnecting...", "Please wait", true);
    setTimeout(connectWS, 1500);
  };
}

function handlePartnerLeft() {
  if (!active) return;
  addMsg("Stranger has disconnected", "system");
  closePC();
  setOverlay("Looking for someone...", "Please wait", true);
  setStatus("Finding...");
  connectWS();
}

// ── Button events ──
startBtn.addEventListener("click", async () => {
  try {
    await getStream();
    if (!iceReady) await loadICE();
  } catch {
    setOverlay("Permission denied", "Allow camera & microphone to continue");
    return;
  }
  active = true;
  startBtn.style.display = "none";
  nextBtn.style.display = "inline-block";
  stopBtn.style.display = "inline-block";
  connectWS();
});

nextBtn.addEventListener("click", () => {
  if (!active) return;
  closePC();
  clearChats();
  addMsg("Looking for someone new...", "system");
  setOverlay("Looking for someone...", "Please wait", true);
  connectWS();
});

stopBtn.addEventListener("click", () => {
  active = false;
  closePC();
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  localVideo.srcObject = null;
  clearChats();
  startBtn.style.display = "inline-block";
  nextBtn.style.display = "none";
  stopBtn.style.display = "none";
  closeDrawer();
  setOverlay("Talk to Strangers", "Click Start to find someone");
  setStatus("Ready");
});

// ── Send message (desktop) ──
function sendMsg() {
  const text = msgInput.value.trim();
  if (!text || ws?.readyState !== WebSocket.OPEN || !partnered) return;
  ws.send(JSON.stringify({ type: "chat", text }));
  addMsg(text, "me");
  msgInput.value = "";
}
sendBtn.addEventListener("click", sendMsg);
msgInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMsg(); });

// ── Send message (mobile) ──
function sendMsgMobile() {
  const text = msgInputM.value.trim();
  if (!text || ws?.readyState !== WebSocket.OPEN || !partnered) return;
  ws.send(JSON.stringify({ type: "chat", text }));
  addMsg(text, "me");
  msgInputM.value = "";
}
sendBtnM.addEventListener("click", sendMsgMobile);
msgInputM.addEventListener("keydown", e => { if (e.key === "Enter") sendMsgMobile(); });

// ── Mic toggle ──
micBtn.addEventListener("click", () => {
  const track = localStream?.getAudioTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  micBtn.textContent = track.enabled ? "🎤" : "🔇";
  micBtn.classList.toggle("off", !track.enabled);
});

// ── Camera toggle ──
camBtn.addEventListener("click", () => {
  const track = localStream?.getVideoTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  camBtn.textContent = track.enabled ? "📷" : "🚫";
  camBtn.classList.toggle("off", !track.enabled);
});
</script>
</body>
</html>
