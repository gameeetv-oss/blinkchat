<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blinkchat — Talk to Strangers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0d12;
  color: #fff;
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 12px 20px;
  background: #13131e;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #1e1e2e;
  flex-shrink: 0;
}

.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo .blink { color: #7c6af7; }
.logo .chat { color: #fff; }

#status-bar { display: flex; gap: 16px; align-items: center; }
#status { font-size: 12px; color: #666; }
#online-count { font-size: 12px; color: #7c6af7; background: #1e1a3a; padding: 3px 10px; border-radius: 20px; }

.main { display: flex; flex: 1; overflow: hidden; }

/* Videos */
.videos { flex: 1; position: relative; background: #000; }

#remote-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

#local-video {
  position: absolute;
  bottom: 16px; right: 16px;
  width: 160px; height: 120px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid #7c6af7;
  background: #1a1a24;
  z-index: 10;
}

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(13,13,18,0.92);
  flex-direction: column;
  gap: 12px;
  z-index: 5;
  transition: opacity 0.3s;
}
.overlay.hidden { display: none; }

.overlay h2 { font-size: 26px; font-weight: 700; }
.overlay p { color: #666; font-size: 14px; }

.spinner {
  width: 42px; height: 42px;
  border: 3px solid #1e1e2e;
  border-top-color: #7c6af7;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Sidebar chat */
.sidebar {
  width: 280px;
  display: flex;
  flex-direction: column;
  background: #10101a;
  border-left: 1px solid #1e1e2e;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 12px 14px;
  font-size: 12px;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid #1e1e2e;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

.msg {
  max-width: 88%;
  padding: 8px 12px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.45;
  word-break: break-word;
}
.msg.them { background: #1e1e2e; align-self: flex-start; border-radius: 4px 14px 14px 14px; }
.msg.me { background: #7c6af7; align-self: flex-end; border-radius: 14px 4px 14px 14px; }
.msg.system { background: transparent; color: #444; font-size: 11px; align-self: center; text-align: center; padding: 2px 0; }

.chat-input {
  padding: 10px;
  border-top: 1px solid #1e1e2e;
  display: flex;
  gap: 8px;
}

#msg-input {
  flex: 1;
  background: #1a1a24;
  border: 1px solid #2a2a3a;
  color: #fff;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
#msg-input:focus { border-color: #7c6af7; }
#msg-input::placeholder { color: #444; }

#send-btn {
  background: #7c6af7;
  border: none;
  color: #fff;
  padding: 9px 13px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  transition: background 0.2s;
}
#send-btn:hover:not(:disabled) { background: #6a5ae0; }
#send-btn:disabled { background: #2a2a3a; cursor: not-allowed; }

/* Controls */
.controls {
  padding: 12px 20px;
  background: #13131e;
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  border-top: 1px solid #1e1e2e;
  flex-shrink: 0;
}

.icon-btn {
  background: #1e1e2e;
  border: none;
  color: #fff;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { background: #2a2a3a; }
.icon-btn.off { background: #c0392b; }

#start-btn {
  background: #7c6af7;
  border: none;
  color: #fff;
  padding: 11px 32px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
  letter-spacing: 0.3px;
}
#start-btn:hover { background: #6a5ae0; }

#next-btn, #stop-btn {
  border: none;
  color: #fff;
  padding: 11px 22px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: none;
}
#next-btn { background: #2a2a3a; }
#next-btn:hover { background: #3a3a4a; }
#stop-btn { background: #c0392b; }
#stop-btn:hover { background: #a93226; }

@media (max-width: 600px) {
  .sidebar { width: 220px; }
  #local-video { width: 110px; height: 82px; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="blink">blink</span><span class="chat">chat</span></div>
  <div id="status-bar">
    <span id="status">Ready</span>
    <span id="online-count">0 online</span>
  </div>
</header>

<div class="main">
  <div class="videos">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="overlay" id="overlay">
      <div class="spinner" id="spinner" style="display:none"></div>
      <h2 id="ov-title">Talk to Strangers</h2>
      <p id="ov-sub">Click Start to find someone</p>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">Chat</div>
    <div id="chat"></div>
    <div class="chat-input">
      <input type="text" id="msg-input" placeholder="Type a message..." disabled maxlength="500" autocomplete="off">
      <button id="send-btn" disabled>➤</button>
    </div>
  </div>
</div>

<div class="controls">
  <button class="icon-btn" id="mic-btn" title="Mute mic">🎤</button>
  <button class="icon-btn" id="cam-btn" title="Turn off camera">📷</button>
  <button id="start-btn">▶ Start</button>
  <button id="next-btn">⏭ Next</button>
  <button id="stop-btn">■ Stop</button>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
let ICE = [{ urls: "stun:stun.l.google.com:19302" }];

async function loadICE() {
  try {
    const r = await fetch("https://asistan-9te2.onrender.com/ice");
    const d = await r.json();
    ICE = d.ice_servers.map(s => ({
      urls: s.url || s.urls,
      username: s.username,
      credential: s.credential
    })).filter(s => s.urls);
    console.log("ICE servers:", ICE.length);
  } catch(e) { console.warn("ICE fetch failed:", e); }
}

let ws = null, pc = null, localStream = null;
let active = false, role = null, partnered = false;
let pendingCandidates = [], remoteDescSet = false;

const remoteVideo = document.getElementById("remote-video");
const localVideo  = document.getElementById("local-video");
const chatEl      = document.getElementById("chat");
const msgInput    = document.getElementById("msg-input");
const sendBtn     = document.getElementById("send-btn");
const startBtn    = document.getElementById("start-btn");
const nextBtn     = document.getElementById("next-btn");
const stopBtn     = document.getElementById("stop-btn");
const overlay     = document.getElementById("overlay");
const ovTitle     = document.getElementById("ov-title");
const ovSub       = document.getElementById("ov-sub");
const spinner     = document.getElementById("spinner");
const statusEl    = document.getElementById("status");
const onlineEl    = document.getElementById("online-count");
const micBtn      = document.getElementById("mic-btn");
const camBtn      = document.getElementById("cam-btn");

function setOverlay(title, sub, spin = false) {
  overlay.classList.remove("hidden");
  ovTitle.textContent = title;
  ovSub.textContent = sub;
  spinner.style.display = spin ? "block" : "none";
}
function hideOverlay() { overlay.classList.add("hidden"); }

function addMsg(text, type = "system") {
  const d = document.createElement("div");
  d.className = "msg " + type;
  d.textContent = text;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function setStatus(t) { statusEl.textContent = t; }

function setOnline(n) {
  if (n !== undefined) onlineEl.textContent = n + " online";
}

async function getStream() {
  if (localStream) return;
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  localVideo.srcObject = localStream;
}

function closePC() {
  if (pc) { pc.close(); pc = null; }
  remoteVideo.srcObject = null;
  partnered = false;
  remoteDescSet = false;
  pendingCandidates = [];
  msgInput.disabled = true;
  sendBtn.disabled = true;
}

function createPC() {
  closePC();
  pc = new RTCPeerConnection({ iceServers: ICE });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    if (e.streams[0]) remoteVideo.srcObject = e.streams[0];
  };

  pc.onicecandidate = e => {
    if (e.candidate && ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: "ice", candidate: e.candidate }));
  };

  pc.onconnectionstatechange = () => {
    const s = pc?.connectionState;
    if (s === "connected") {
      partnered = true;
      hideOverlay();
      setStatus("Connected");
      addMsg("You are now chatting with a stranger", "system");
      msgInput.disabled = false;
      sendBtn.disabled = false;
    }
    if (s === "failed") handlePartnerLeft();
  };

  pc.oniceconnectionstatechange = () => {
    if (pc?.iceConnectionState === "failed") {
      pc.restartIce();
    }
  };
}

function connectWS() {
  if (ws) { ws.onclose = null; ws.close(); }
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus("Finding...");
    setOverlay("Looking for someone...", "Please wait", true);
  };

  ws.onmessage = async ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.online !== undefined) setOnline(msg.online);

    if (msg.type === "waiting") {
      setOverlay("Looking for someone...", "Please wait", true);
    }
    else if (msg.type === "matched") {
      role = msg.role;
      chatEl.innerHTML = "";
      createPC();
      setOverlay("Connecting...", "", true);
      setStatus("Connecting...");

      if (role === "offerer") {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: "offer", sdp: pc.localDescription }));
      }
    }
    else if (msg.type === "offer") {
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      remoteDescSet = true;
      for (const c of pendingCandidates) { try { await pc.addIceCandidate(c); } catch {} }
      pendingCandidates = [];
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: "answer", sdp: pc.localDescription }));
    }
    else if (msg.type === "answer") {
      await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
      remoteDescSet = true;
      for (const c of pendingCandidates) { try { await pc.addIceCandidate(c); } catch {} }
      pendingCandidates = [];
    }
    else if (msg.type === "ice") {
      if (remoteDescSet) {
        try { await pc?.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch {}
      } else {
        pendingCandidates.push(msg.candidate);
      }
    }
    else if (msg.type === "chat") {
      addMsg(msg.text, "them");
    }
    else if (msg.type === "partner_left") {
      handlePartnerLeft();
    }
  };

  ws.onclose = () => {
    if (!active) return;
    setStatus("Reconnecting...");
    setTimeout(connectWS, 1500);
  };
}

function handlePartnerLeft() {
  if (!active) return;
  addMsg("Stranger has disconnected", "system");
  closePC();
  setOverlay("Stranger left", "Finding a new one...", true);
  setStatus("Finding...");
  setTimeout(connectWS, 1000);
}

// Buttons
startBtn.addEventListener("click", async () => {
  try {
    await getStream();
    await loadICE();
  } catch {
    setOverlay("Permission denied", "Allow camera & microphone to continue");
    return;
  }
  active = true;
  startBtn.style.display = "none";
  nextBtn.style.display = "inline-block";
  stopBtn.style.display = "inline-block";
  connectWS();
});

nextBtn.addEventListener("click", () => {
  if (!active) return;
  closePC();
  chatEl.innerHTML = "";
  addMsg("Looking for someone new...", "system");
  setOverlay("Looking for someone...", "Please wait", true);
  connectWS();
});

stopBtn.addEventListener("click", () => {
  active = false;
  closePC();
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  localVideo.srcObject = null;
  chatEl.innerHTML = "";
  startBtn.style.display = "inline-block";
  nextBtn.style.display = "none";
  stopBtn.style.display = "none";
  setOverlay("Talk to Strangers", "Click Start to find someone");
  setStatus("Ready");
});

// Send message
function sendMsg() {
  const text = msgInput.value.trim();
  if (!text || ws?.readyState !== WebSocket.OPEN || !partnered) return;
  ws.send(JSON.stringify({ type: "chat", text }));
  addMsg(text, "me");
  msgInput.value = "";
}
sendBtn.addEventListener("click", sendMsg);
msgInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMsg(); });

// Mic toggle
micBtn.addEventListener("click", () => {
  const track = localStream?.getAudioTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  micBtn.textContent = track.enabled ? "🎤" : "🔇";
  micBtn.classList.toggle("off", !track.enabled);
});

// Camera toggle
camBtn.addEventListener("click", () => {
  const track = localStream?.getVideoTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  camBtn.textContent = track.enabled ? "📷" : "🚫";
  camBtn.classList.toggle("off", !track.enabled);
});
</script>
</body>
</html>
